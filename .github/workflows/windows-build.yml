name: 🪟 Windows Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      
    - name: 📦 安装 Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtserialbus'
        cache: 'true'
        
    - name: 🔨 配置 CMake
      shell: bash
      run: |
        # 使用 CMAKE_PREFIX_PATH 指向 Qt
        export CMAKE_PREFIX_PATH="$QT_ROOT_DIR"
        cmake -S . -B build
        
    - name: 🏗️ 编译项目
      run: |
        cmake --build build --config Release
        
    - name: 📁 收集依赖
      run: |
        mkdir deploy
        copy build\Release\QtModbusTool.exe deploy\
        windeployqt deploy\QtModbusTool.exe --release
        
    - name: 📦 创建压缩包
      run: |
        Compress-Archive -Path deploy\* -DestinationPath QtModbusTool-Windows-x64.zip -Force
        
    - name: 📤 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: QtModbusTool-Windows-x64
        path: QtModbusTool-Windows-x64.zip
        retention-days: 30
