name: 🪟 Windows Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      
    - name: 📦 安装 Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.1'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtserialbus'
        
    - name: 🔨 配置 CMake
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64
        
    - name: 🏗️ 编译项目
      run: |
        cmake --build build --config Release
        
    - name: 📁 收集依赖
      run: |
        mkdir deploy
        copy build\Release\QtModbusTool.exe deploy\
        windeployqt deploy\QtModbusTool.exe --release
        
    - name: 📦 创建压缩包
      run: |
        Compress-Archive -Path deploy\* -DestinationPath QtModbusTool-Windows-x64.zip
        
    - name: 📤 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: QtModbusTool-Windows-x64
        path: QtModbusTool-Windows-x64.zip
        retention-days: 30
        
    - name: 🏷️ 创建 Release (仅 tag 推送时)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: QtModbusTool-Windows-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
