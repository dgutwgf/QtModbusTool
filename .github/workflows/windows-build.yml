name: 🪟 Windows Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4
      
    - name: 📦 安装 Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtserialbus qtserialport'
        cache: 'false'
        
    - name: 🔨 配置 CMake
      run: |
        cmake -S . -B build
        
    - name: 🏗️ 编译项目
      run: |
        cmake --build build --config Release
        
    - name: 📁 打包程序
      run: |
        # 创建发布目录
        New-Item -ItemType Directory -Force -Path publish
        
        # 复制主程序
        Copy-Item build\Release\QtModbusTool.exe publish\
        
        # 复制 Qt DLL
        Copy-Item $env:QT_ROOT_DIR\bin\Qt6Core.dll publish\
        Copy-Item $env:QT_ROOT_DIR\bin\Qt6Gui.dll publish\
        Copy-Item $env:QT_ROOT_DIR\bin\Qt6Widgets.dll publish\
        Copy-Item $env:QT_ROOT_DIR\bin\Qt6SerialBus.dll publish\
        Copy-Item $env:QT_ROOT_DIR\bin\Qt6SerialPort.dll publish\
        
        # 复制平台插件（必须！）
        New-Item -ItemType Directory -Force -Path publish\platforms
        Copy-Item $env:QT_ROOT_DIR\plugins\platforms\qwindows.dll publish\platforms\
        
        # 复制样式插件（可选）
        New-Item -ItemType Directory -Force -Path publish\styles
        Copy-Item $env:QT_ROOT_DIR\plugins\styles\*.dll publish\styles\
        
        # 复制多媒体插件（可选）
        New-Item -ItemType Directory -Force -Path publish\imageformats
        Copy-Item $env:QT_ROOT_DIR\plugins\imageformats\*.dll publish\imageformats\
        
        # 复制 VC 运行时（如果存在）
        if (Test-Path "$env:VCToolsRedistDir\x64\Microsoft.VC*.CRT\*.dll") {
            Copy-Item $env:VCToolsRedistDir\x64\Microsoft.VC*.CRT\*.dll publish\
        }
        
    - name: 📦 创建压缩包
      run: |
        Compress-Archive -Path publish\* -DestinationPath QtModbusTool-Windows-x64.zip -Force
        
    - name: 📤 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: QtModbusTool-Windows-x64
        path: QtModbusTool-Windows-x64.zip
        retention-days: 30
